<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Posture Detection System — Login to your account for real-time posture monitoring.">
    <title>Login — Posture Detection System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-bg-effects">
        <div class="hero-orb hero-orb-1"></div>
        <div class="hero-orb hero-orb-2"></div>
        <div class="hero-orb hero-orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="logo-icon">◉</span>
                <span class="logo-text">Posture System</span>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue monitoring your posture</p>

            <div class="auth-alert" id="loginAlert"></div>

            <form id="loginForm" class="auth-form" autocomplete="off">
                <div class="form-group">
                    <label for="loginStudentId" class="form-label">Student ID</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🆔</span>
                        <input type="text" id="loginStudentId" class="form-input" placeholder="Enter your Student ID" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="loginPassword" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary auth-btn" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-arrow">→</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html" class="auth-link">Create one</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
