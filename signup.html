<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Posture Detection System — Create your account for real-time posture monitoring.">
    <title>Sign Up — Posture Detection System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-bg-effects">
        <div class="hero-orb hero-orb-1"></div>
        <div class="hero-orb hero-orb-2"></div>
        <div class="hero-orb hero-orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="logo-icon">◉</span>
                <span class="logo-text">Posture System</span>
            </div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join us and start improving your posture today</p>

            <div class="auth-alert" id="signupAlert"></div>

            <form id="signupForm" class="auth-form" autocomplete="off">
                <div class="form-group">
                    <label for="signupName" class="form-label">Full Name</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="signupName" class="form-input" placeholder="Enter your full name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="signupStudentId" class="form-label">Student ID</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🆔</span>
                        <input type="text" id="signupStudentId" class="form-input" placeholder="Enter your Student ID" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="signupPassword" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="signupPassword" class="form-input" placeholder="Create a password (min 6 chars)" required minlength="6">
                    </div>
                </div>
                <div class="form-group">
                    <label for="signupConfirmPassword" class="form-label">Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input type="password" id="signupConfirmPassword" class="form-input" placeholder="Confirm your password" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary auth-btn" id="signupBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-arrow">→</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="index.html" class="auth-link">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
